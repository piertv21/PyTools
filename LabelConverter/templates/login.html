<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Accedi al servizio Label Converter." />
    <title>Login — Label Converter</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <style>
        /* ── Reset & Tokens ─────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary:   #0b0f19;
            --bg-card:      rgba(255, 255, 255, 0.04);
            --border:       rgba(255, 255, 255, 0.08);
            --accent:       #6c63ff;
            --accent-glow:  rgba(108, 99, 255, 0.35);
            --accent-light: #a78bfa;
            --text-primary: #f0f0f5;
            --text-muted:   #8b8fa3;
            --error:        #f87171;
            --radius:       16px;
            --font:         'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        html { font-size: 16px; }

        body {
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── Animated background blobs ──────────────────────────────── */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: .4;
            z-index: 0;
            pointer-events: none;
        }
        body::before {
            width: 600px; height: 600px;
            background: radial-gradient(circle, #6c63ff 0%, transparent 70%);
            top: -150px; left: -100px;
            animation: float-blob 14s ease-in-out infinite alternate;
        }
        body::after {
            width: 500px; height: 500px;
            background: radial-gradient(circle, #a78bfa 0%, transparent 70%);
            bottom: -120px; right: -80px;
            animation: float-blob 18s ease-in-out infinite alternate-reverse;
        }

        @keyframes float-blob {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, 40px) scale(1.15); }
        }

        /* ── Card ───────────────────────────────────────────────────── */
        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            margin: 24px;
            background: var(--bg-card);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 48px 36px;
            box-shadow:
                0 0 80px rgba(108, 99, 255, 0.08),
                0 24px 48px rgba(0, 0, 0, 0.4);
            transition: box-shadow .3s ease;
        }
        .card:hover {
            box-shadow:
                0 0 100px rgba(108, 99, 255, 0.14),
                0 32px 64px rgba(0, 0, 0, 0.5);
        }

        /* ── Header ─────────────────────────────────────────────────── */
        .header { text-align: center; margin-bottom: 36px; }

        .header .icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px; height: 64px;
            border-radius: 18px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            margin-bottom: 18px;
            box-shadow: 0 8px 24px var(--accent-glow);
            animation: pulse-icon 3s ease-in-out infinite;
        }
        @keyframes pulse-icon {
            0%, 100% { box-shadow: 0 8px 24px var(--accent-glow); }
            50%      { box-shadow: 0 12px 36px rgba(108, 99, 255, 0.5); }
        }
        .header .icon svg {
            width: 30px; height: 30px;
            fill: none; stroke: #fff;
            stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
        }

        .header h1 {
            font-size: 1.65rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p {
            margin-top: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* ── Form ───────────────────────────────────────────────────── */
        .form-group {
            position: relative;
            margin-bottom: 8px;
        }

        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px; height: 18px;
            stroke: var(--text-muted);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke .3s;
            pointer-events: none;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 14px 14px 44px;
            font-family: var(--font);
            font-size: 0.95rem;
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 12px;
            outline: none;
            transition: border-color .3s, box-shadow .3s, background .3s;
        }
        .input-wrapper input::placeholder {
            color: var(--text-muted);
            opacity: .6;
        }
        .input-wrapper input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
            background: rgba(255, 255, 255, 0.06);
        }
        .input-wrapper input:focus + svg,
        .input-wrapper input:focus ~ svg {
            stroke: var(--accent-light);
        }

        /* ── Toggle password visibility ─────────────────────────────── */
        .toggle-pw {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toggle-pw svg {
            position: static;
            transform: none;
            left: auto;
            width: 20px; height: 20px;
            stroke: var(--text-muted);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke .2s;
            pointer-events: none;
        }
        .toggle-pw:hover svg { stroke: var(--accent-light); }
        .toggle-pw .eye-off { display: none; }
        .toggle-pw.visible .eye-on  { display: none; }
        .toggle-pw.visible .eye-off { display: block; }

        /* ── Button ─────────────────────────────────────────────────── */
        .btn {
            display: block;
            width: 100%;
            margin-top: 24px;
            padding: 14px;
            font-family: var(--font);
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border: none;
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform .15s ease, box-shadow .25s ease;
            box-shadow: 0 4px 16px var(--accent-glow);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(108, 99, 255, 0.45);
        }
        .btn:active { transform: translateY(0); }

        /* ── Flash messages ─────────────────────────────────────────── */
        .flash {
            margin-bottom: 20px;
            text-align: center;
            padding: 10px 16px;
            font-size: 0.85rem;
            border-radius: 10px;
            animation: shake .4s ease;
        }
        .flash.error {
            color: var(--error);
            background: rgba(248, 113, 113, 0.08);
            border: 1px solid rgba(248, 113, 113, 0.2);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%      { transform: translateX(-6px); }
            40%      { transform: translateX(6px); }
            60%      { transform: translateX(-4px); }
            80%      { transform: translateX(4px); }
        }

        /* ── Footer ─────────────────────────────────────────────────── */
        .footer {
            margin-top: 32px;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            opacity: .6;
        }
    </style>
</head>
<body>
    <main class="card">
        <!-- Header -->
        <div class="header">
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>
            <h1>Accesso richiesto</h1>
            <p>Inserisci la password per accedere al Label Converter.</p>
        </div>

        <!-- Flash messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash {{ category }}" id="flash-msg">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        <!-- Login form -->
        <form method="post" action="/login" id="login-form">
            <div class="form-group">
                <label for="password-input">Password</label>
                <div class="input-wrapper">
                    <input
                        type="password"
                        name="password"
                        id="password-input"
                        placeholder="Inserisci la password"
                        autocomplete="current-password"
                        required
                        autofocus
                    />
                    <svg viewBox="0 0 24 24">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Mostra password">
                        <svg class="eye-on" viewBox="0 0 24 24">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <svg class="eye-off" viewBox="0 0 24 24">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                            <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                    </button>
                </div>
            </div>

            <button class="btn" type="submit" id="login-btn">Accedi</button>
        </form>

        <div class="footer">Label Converter &middot; Accesso protetto</div>
    </main>

    <script>
        /* ── Toggle password visibility ─────────────────────────── */
        const toggle = document.getElementById('toggle-pw');
        const pwInput = document.getElementById('password-input');

        toggle.addEventListener('click', () => {
            const isPassword = pwInput.type === 'password';
            pwInput.type = isPassword ? 'text' : 'password';
            toggle.classList.toggle('visible', isPassword);
        });

        /* ── Submit on Enter ────────────────────────────────────── */
        pwInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('login-form').submit();
            }
        });
    </script>
</body>
</html>
